air-drain:
  enabled: true
  # Logs air regeneration and drain decisions for testing. Keep disabled on live servers.
  debug: false

  # Follow vanilla-style breathing protection by default.
  # Water Breathing and Conduit Power stop entropy air drain and entropy damage,
  # and they are allowed to restore air like vanilla. Respiration reduces
  # entropy air loss instead of granting full immunity.
  breathing-protection:
    water-breathing:
      stops-air-loss: true
      stops-damage: true
      allows-regeneration: true
    conduit-power:
      stops-air-loss: true
      stops-damage: true
      allows-regeneration: true
    # Breath of the Nautilus pauses oxygen consumption without refilling air.
    nautilus-breath:
      stops-air-loss: true
      stops-damage: true
      allows-regeneration: false
    respiration:
      # Applies to plugin-owned in-air air loss. Vanilla already applies
      # Respiration before underwater air-decrease events reach the plugin.
      reduces-in-air-loss: true
      reduces-in-water-loss: false

  # Creative and spectator players are ignored by default.
  ignored-game-modes:
    - CREATIVE
    - SPECTATOR

  in-air:
    enabled: true

    regeneration:
      prevent: true

    # Lowest air value the plugin can set. Vanilla drowning commonly uses -20 as
    # the damage threshold.
    min-air: -20

    # Plugin-owned air loss outside active vanilla underwater breathing. The
    # interval shares one per-player entropy air-loss clock with water, so
    # switching between air and water cannot reset the cadence.
    air-loss:
      interval-ticks: 20
      # EntropyCore base entropy is intentionally small, so these tiers are tuned
      # around low integer values instead of large linear scores.
      tiers:
        - min-entropy: 1
          amount: 1
        - min-entropy: 2
          amount: 2
        - min-entropy: 3
          amount: 4
        - min-entropy: 5
          amount: 7
        - min-entropy: 8
          amount: 12

    depleted-air:
      # fixed: once air is depleted, use fixed-loss for vanilla-like damage cadence.
      # entropy: keep using the entropy tier air loss after air is depleted.
      mode: fixed
      fixed-loss: 20

    damage:
      enabled: true
      interval-ticks: 20
      air-threshold: -20
      amount: 2.0
      # generic, suffocation, or drowning. Suffocation matches air depletion
      # outside water better than vanilla drowning death semantics.
      type: suffocation
      preserve-overflow-reset: true
      reset-air-to: 0

  in-water:
    # Vanilla already drains air and applies drowning damage in water. Enable
    # this only if entropy should make water more dangerous.
    enabled: false
    min-air: -20

    # Total air loss for a vanilla underwater air-decrease event when due.
    # The interval shares one per-player entropy air-loss clock with air, so
    # entering and leaving water cannot reset the cadence.
    air-loss:
      interval-ticks: 20
      tiers:
        - min-entropy: 1
          amount: 1
        - min-entropy: 2
          amount: 2
        - min-entropy: 3
          amount: 4
        - min-entropy: 5
          amount: 7
        - min-entropy: 8
          amount: 12

    depleted-air-loss:
      # entropy: continue using the entropy tier air loss after vanilla air is depleted.
      # fixed: use fixed-loss as the air loss when vanilla air is already <= 0.
      mode: entropy
      fixed-loss: 20

    drowning-damage:
      # This sets the vanilla DROWNING damage event amount; it does not run its own
      # damage timer and does not change the damage type.
      enabled: false
      air-threshold: -20
      amount: 2.0
      preserve-overflow-reset: true
      reset-air-to: 0
